<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#ecfdf5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#d1fae5" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Workflow steps (right side) -->
  <g transform="translate(750, 100)">
    <rect x="0" y="0" width="380" height="400" rx="8" fill="white" stroke="#a7f3d0" stroke-width="2"/>
    <!-- Step 1 -->
    <rect x="0" y="0" width="380" height="2" fill="#059669" rx="1"/>
    <circle cx="35" cy="55" r="20" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="35" y="61" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#059669">1</text>
    <text x="70" y="48" font-family="monospace" font-size="15" font-weight="bold" fill="#065f46">INTAKE</text>
    <text x="70" y="66" font-family="monospace" font-size="11" fill="#6b7280">Capture claim + patient data</text>
    <!-- Step 2 -->
    <circle cx="35" cy="145" r="20" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="35" y="151" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#059669">2</text>
    <text x="70" y="138" font-family="monospace" font-size="15" font-weight="bold" fill="#065f46">VALIDATE</text>
    <text x="70" y="156" font-family="monospace" font-size="11" fill="#6b7280">Verify codes and coverage</text>
    <!-- Connector -->
    <line x1="35" y1="75" x2="35" y2="125" stroke="#a7f3d0" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Step 3 -->
    <line x1="35" y1="165" x2="35" y2="215" stroke="#a7f3d0" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="35" cy="235" r="20" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
    <text x="35" y="241" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#059669">3</text>
    <text x="70" y="228" font-family="monospace" font-size="15" font-weight="bold" fill="#065f46">PROCESS</text>
    <text x="70" y="246" font-family="monospace" font-size="11" fill="#6b7280">Automated billing logic</text>
    <!-- Step 4 -->
    <line x1="35" y1="255" x2="35" y2="305" stroke="#a7f3d0" stroke-width="2" stroke-dasharray="4,3"/>
    <circle cx="35" cy="325" r="20" fill="#059669" stroke="#059669" stroke-width="2"/>
    <text x="35" y="331" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="white">✓</text>
    <text x="70" y="318" font-family="monospace" font-size="15" font-weight="bold" fill="#065f46">SUBMIT</text>
    <text x="70" y="336" font-family="monospace" font-size="11" fill="#6b7280">Route claims for payment</text>
    <!-- FastAPI tag -->
    <rect x="20" y="365" width="90" height="24" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="65" y="381" text-anchor="middle" font-family="monospace" font-size="12" fill="#059669">FastAPI</text>
    <rect x="122" y="365" width="80" height="24" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="162" y="381" text-anchor="middle" font-family="monospace" font-size="12" fill="#059669">Python</text>
    <rect x="214" y="365" width="110" height="24" rx="12" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
    <text x="269" y="381" text-anchor="middle" font-family="monospace" font-size="12" fill="#059669">Pydantic v2</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#059669" stroke-width="2" fill="none" opacity="0.4">
    <polyline points="20,20 20,60 60,60"/>
    <polyline points="1180,20 1180,60 1140,60"/>
    <polyline points="20,610 20,570 60,570"/>
    <polyline points="1180,610 1180,570 1140,570"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="#059669"/>

  <!-- Medical cross -->
  <g transform="translate(590, 80)" opacity="0.15">
    <rect x="-8" y="-30" width="16" height="60" rx="3" fill="#059669"/>
    <rect x="-30" y="-8" width="60" height="16" rx="3" fill="#059669"/>
  </g>

  <!-- Main title -->
  <text x="100" y="140" font-family="monospace" font-size="70" font-weight="bold" fill="#064e3b">GREENFIELD</text>
  <text x="100" y="210" font-family="monospace" font-size="38" font-weight="bold" fill="#059669">Claim Cruncher</text>

  <!-- Divider -->
  <line x1="100" y1="230" x2="620" y2="230" stroke="#a7f3d0" stroke-width="2"/>

  <!-- Description -->
  <text x="100" y="270" font-family="monospace" font-size="18" fill="#047857">Medical billing intake platform</text>
  <text x="100" y="300" font-family="monospace" font-size="15" fill="#6b7280">Built by Gavin Brazelton · Python / FastAPI</text>

  <!-- ICD/CPT badge -->
  <rect x="100" y="325" width="130" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="165" y="343" text-anchor="middle" font-family="monospace" font-size="13" fill="#065f46">ICD + CPT Codes</text>
  <rect x="243" y="325" width="130" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="308" y="343" text-anchor="middle" font-family="monospace" font-size="13" fill="#065f46">REST API</text>
  <rect x="386" y="325" width="130" height="28" rx="4" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="451" y="343" text-anchor="middle" font-family="monospace" font-size="13" fill="#065f46">Validation</text>

  <!-- Description continued -->
  <text x="100" y="395" font-family="monospace" font-size="14" fill="#6b7280">Streamline medical billing intake · Track claims · Generate reports</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="white" opacity="0.9"/>
  <line x1="0" y1="580" x2="1200" y2="580" stroke="#a7f3d0" stroke-width="2"/>
  <text x="30" y="611" font-family="monospace" font-size="13" fill="#059669">github.com/thebardchat/Greenfield</text>
  <text x="1170" y="611" text-anchor="end" font-family="monospace" font-size="13" fill="#6b7280">Built by Shane + Claude Anthropic</text>
</svg>
